$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline

display_name: memoryagentbench_parallel_real
experiment_name: memoryagentbench_runtime_compare_real
description: Real-LLM-call variant of the fat dry-run parallel pipeline. Materializes the matrix, fans out base/memory/hipporag shards into independent command jobs that each issue real Azure OpenAI completions, then aggregates.

settings:
  default_datastore: azureml:workspaceblobstore
  default_compute: azureml:image-builder
  continue_on_step_failure: false

inputs:
  matrix_spec:
    type: uri_file
    path: ../matrix/real_smoke_matrix.json

outputs:
  aggregate_report:
    type: uri_folder
    mode: upload

jobs:
  materialize_matrix:
    type: command
    component: ../components/materialize_matrix_real.yml
    inputs:
      matrix_spec: ${{parent.inputs.matrix_spec}}

  run_base:
    type: command
    component: ../components/run_shards_real.yml
    inputs:
      shards: ${{parent.jobs.materialize_matrix.outputs.base_shards}}
      environment_profile: base

  run_memory:
    type: command
    component: ../components/run_shards_real.yml
    inputs:
      shards: ${{parent.jobs.materialize_matrix.outputs.memory_shards}}
      environment_profile: memory

  run_hipporag:
    type: command
    component: ../components/run_shards_real.yml
    inputs:
      shards: ${{parent.jobs.materialize_matrix.outputs.hipporag_shards}}
      environment_profile: hipporag

  aggregate:
    type: command
    component: ../components/aggregate_results_real.yml
    inputs:
      base_artifacts: ${{parent.jobs.run_base.outputs.bundles}}
      memory_artifacts: ${{parent.jobs.run_memory.outputs.bundles}}
      hipporag_artifacts: ${{parent.jobs.run_hipporag.outputs.bundles}}
    outputs:
      report_dir: ${{parent.outputs.aggregate_report}}
