$schema: https://azuremlschemas.azureedge.net/latest/pipelineJob.schema.json
type: pipeline

display_name: memoryagentbench_sequential_dryrun
experiment_name: memoryagentbench_runtime_compare
description: Sequential baseline pipeline. Runs every matrix shard inside a single command job, producing the same bundle layout as the parallel pipeline so wall-clock comparisons are apples-to-apples.

settings:
  default_datastore: azureml:workspaceblobstore
  default_compute: azureml:image-builder
  continue_on_step_failure: false

inputs:
  source_tree:
    type: uri_folder
    path: ../..
  matrix_spec:
    type: uri_file
    path: ../matrix/dryrun_fat_matrix.json

outputs:
  aggregate_report:
    type: uri_folder
    mode: upload

jobs:
  run_all:
    type: command
    component: ../components/run_matrix_sequential_dryrun.yml
    inputs:
      source_tree: ${{parent.inputs.source_tree}}
      matrix_spec: ${{parent.inputs.matrix_spec}}

  aggregate:
    type: command
    component: ../components/aggregate_results_flat_dryrun.yml
    inputs:
      bundles: ${{parent.jobs.run_all.outputs.bundles}}
    outputs:
      report_dir: ${{parent.outputs.aggregate_report}}
