$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: aggregate_benchmark_results_dryrun
display_name: Aggregate Benchmark Results (dry-run)
version: 1
description: Same as aggregate_benchmark_results but bound to the lightweight dry-run environment.
is_deterministic: false

code: ../scripts
environment: azureml:mabench-dryrun:2

inputs:
  base_artifacts:
    type: uri_folder
  memory_artifacts:
    type: uri_folder
  hipporag_artifacts:
    type: uri_folder

outputs:
  report_dir:
    type: uri_folder

command: >-
  python aggregate_results.py
  --base_artifacts ${{inputs.base_artifacts}}
  --memory_artifacts ${{inputs.memory_artifacts}}
  --hipporag_artifacts ${{inputs.hipporag_artifacts}}
  --report_dir ${{outputs.report_dir}}
