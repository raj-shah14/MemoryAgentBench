$schema: https://azuremlschemas.azureedge.net/latest/commandComponent.schema.json
type: command

name: aggregate_benchmark_results_flat_real
display_name: Aggregate Benchmark Results (flat, real)
version: 1
description: Flat aggregator for the real sequential pipeline.
is_deterministic: false

code: ../scripts
environment: azureml:mabench-real-smoke:1

inputs:
  bundles:
    type: uri_folder

outputs:
  report_dir:
    type: uri_folder

command: >-
  python aggregate_results_flat.py
  --bundles ${{inputs.bundles}}
  --report_dir ${{outputs.report_dir}}
